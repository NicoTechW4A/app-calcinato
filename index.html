<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0055A5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Comune di Calcinato</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-back" id="topbar-back" onclick="goBack()">
      <svg viewBox="0 0 16 16"><path d="M10 13L5 8l5-5"/></svg>
      Indietro
    </div>
    <img class="topbar-logo" id="topbar-logo" src="assets/stemma-calcinato.png" alt="Stemma Calcinato">
    <div class="topbar-text" id="topbar-text">
      <div class="t1">Comune di Calcinato</div>
      <div class="t2">Brescia &mdash; BS</div>
    </div>
    <div class="topbar-weather" id="topbar-weather" onclick="toggleWeeklyWeather()">
      <div class="weather-today" id="weather-today">
        <span class="weather-icon" id="weather-icon">--</span>
        <span class="weather-temp" id="weather-temp">--&deg;</span>
      </div>
    </div>
  </div>

  <!-- WEEKLY WEATHER PANEL -->
  <div class="weather-panel" id="weather-panel">
    <div class="weather-panel-header">
      <span class="sec-lbl" style="margin:0">Meteo Calcinato</span>
      <span class="weather-close" onclick="toggleWeeklyWeather()">&times;</span>
    </div>
    <div class="weather-week" id="weather-week"></div>
  </div>

  <!-- SCREENS -->
  <div class="screen-wrap">

    <!-- HOME -->
    <div class="screen active" id="scr-home">
      <div class="scroll">
        <div id="home-hero"></div>
        <div class="sec-lbl">Accesso rapido</div>
        <div class="quick-grid">
          <div class="qcard" onclick="goScreen('news')">
            <div class="qcard-ico"><svg viewBox="0 0 20 20"><rect x="2" y="3" width="16" height="14" rx="2"/><path d="M5 8h10M5 12h6"/></svg></div>
            <div class="qcard-lbl">Novit&agrave;</div>
          </div>
          <div class="qcard" onclick="goScreen('attivita')">
            <div class="qcard-ico"><svg viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg></div>
            <div class="qcard-lbl">Attivit&agrave; locali</div>
          </div>
          <div class="qcard" onclick="goScreen('contatti')">
            <div class="qcard-ico"><svg viewBox="0 0 20 20"><rect x="2" y="3" width="16" height="14" rx="2"/><path d="M2 8h16M7 3v5M13 3v5"/></svg></div>
            <div class="qcard-lbl">Uffici</div>
          </div>
          <div class="qcard" onclick="goScreen('info')">
            <div class="qcard-ico"><svg viewBox="0 0 20 20"><path d="M10 2C7.24 2 5 4.24 5 7c0 4 5 9 5 9s5-5 5-9c0-2.76-2.24-5-5-5z"/><circle cx="10" cy="7" r="2" style="stroke-width:1.2"/></svg></div>
            <div class="qcard-lbl">Info Comune</div>
          </div>
        </div>
        <div class="sec-lbl">Ultime notizie</div>
        <div id="home-news-list"></div>
      </div>
    </div>

    <!-- NEWS LIST -->
    <div class="screen" id="scr-news">
      <div class="tab-row">
        <div class="tab active" data-filter="tutte" onclick="setNewsTab(this)">Tutte</div>
        <div class="tab" data-filter="notizie" onclick="setNewsTab(this)">Notizie</div>
        <div class="tab" data-filter="avvisi" onclick="setNewsTab(this)">Avvisi</div>
        <div class="tab" data-filter="comunicati" onclick="setNewsTab(this)">Comunicati</div>
      </div>
      <div class="scroll" id="news-list"></div>
    </div>

    <!-- ARTICLE DETAIL -->
    <div class="screen" id="scr-article">
      <div class="scroll">
        <div class="article-img" id="art-img">
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect width="56" height="56" rx="8" fill="#D4E6F8"/><path d="M8 40l12-14 10 12 8-10 10 12H8z" fill="#0055A5"/></svg>
        </div>
        <div class="article-pill" id="art-pill"></div>
        <div class="article-title" id="art-title"></div>
        <div class="article-meta" id="art-meta"></div>
        <div class="article-body" id="art-body"></div>
        <div class="article-tags" id="art-tags"></div>
      </div>
    </div>

    <!-- ATTIVITA -->
    <div class="screen" id="scr-attivita">
      <div class="tab-row">
        <div class="tab active" data-cat="tutte" onclick="setAttTab(this)">Tutte</div>
        <div class="tab" data-cat="ristorazione" onclick="setAttTab(this)">Ristorazione</div>
        <div class="tab" data-cat="commercio" onclick="setAttTab(this)">Commercio</div>
        <div class="tab" data-cat="sport" onclick="setAttTab(this)">Sport</div>
        <div class="tab" data-cat="salute" onclick="setAttTab(this)">Salute</div>
        <div class="tab" data-cat="servizi" onclick="setAttTab(this)">Servizi</div>
      </div>
      <div class="scroll" id="att-list"></div>
    </div>

    <!-- CONTATTI -->
    <div class="screen" id="scr-contatti">
      <div class="scroll" id="contatti-list"></div>
    </div>

    <!-- INFO -->
    <div class="screen" id="scr-info">
      <div class="scroll" id="info-content"></div>
    </div>

  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="nb active" id="nb-home" onclick="goScreen('home')">
      <svg viewBox="0 0 22 22"><path d="M3 10.5L11 3l8 7.5V19a1 1 0 01-1 1H4a1 1 0 01-1-1v-8.5z"/></svg>
      <span>Home</span>
    </button>
    <button class="nb" id="nb-news" onclick="goScreen('news')">
      <svg viewBox="0 0 22 22"><rect x="3" y="4" width="16" height="14" rx="2"/><path d="M6 9h10M6 13h6"/></svg>
      <span>Novit&agrave;</span>
    </button>
    <button class="nb" id="nb-attivita" onclick="goScreen('attivita')">
      <svg viewBox="0 0 22 22"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="12" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="12" width="7" height="7" rx="1.5"/><rect x="12" y="12" width="7" height="7" rx="1.5"/></svg>
      <span>Attivit&agrave;</span>
    </button>
    <button class="nb" id="nb-contatti" onclick="goScreen('contatti')">
      <svg viewBox="0 0 22 22"><rect x="3" y="4" width="16" height="14" rx="2"/><path d="M3 9h16M8 4v5M14 4v5"/></svg>
      <span>Contatti</span>
    </button>
    <button class="nb" id="nb-info" onclick="goScreen('info')">
      <svg viewBox="0 0 22 22"><circle cx="11" cy="11" r="8"/><path d="M11 10v5M11 8h.01"/></svg>
      <span>Info</span>
    </button>
  </nav>

</div>

<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
